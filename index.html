<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SP Digital Journey - Get in Touch</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', sans-serif;
      background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
      color: #333;
      line-height: 1.6;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .container {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.08);
      width: 100%;
      max-width: 500px;
      overflow: hidden;
      animation: slideUp 0.6s ease-out;
    }

    .header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 40px 30px;
      text-align: center;
    }

    .header h1 {
      font-size: 28px;
      font-weight: 600;
      margin-bottom: 8px;
      letter-spacing: -0.5px;
    }

    .header p {
      font-size: 14px;
      opacity: 0.95;
      font-weight: 300;
    }

    .content {
      padding: 40px 30px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      font-size: 14px;
      font-weight: 500;
      color: #333;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    input, textarea {
      width: 100%;
      padding: 12px 14px;
      border: 1.5px solid #e0e6ed;
      border-radius: 6px;
      background: #fafbfc;
      color: #333;
      font-size: 14px;
      font-family: inherit;
      outline: none;
      transition: all 0.3s ease;
    }

    input:focus, textarea:focus {
      border-color: #667eea;
      background: #fff;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }

    textarea {
      resize: vertical;
      min-height: 100px;
    }

    input::placeholder, textarea::placeholder {
      color: #999;
    }

    .error-message {
      display: none;
      font-size: 12px;
      color: #e74c3c;
      margin-top: 5px;
    }

    .error-message.show {
      display: block;
    }

    button {
      width: 100%;
      padding: 14px 20px;
      margin-top: 25px;
      border: none;
      border-radius: 6px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      font-size: 15px;
      font-weight: 600;
      letter-spacing: 0.5px;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
    }

    button:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
    }

    button:active:not(:disabled) {
      transform: translateY(0);
    }

    button:disabled {
      opacity: 0.7;
      cursor: not-allowed;
    }

    .button-text {
      display: inline;
    }

    .spinner {
      display: none;
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-right: 8px;
    }

    .spinner.show {
      display: inline-block;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .info-text {
      font-size: 12px;
      color: #777;
      margin-top: 15px;
      text-align: center;
      line-height: 1.5;
    }

    .success-message {
      display: none;
      background: #d4edda;
      color: #155724;
      padding: 12px;
      border-radius: 6px;
      margin-bottom: 20px;
      font-size: 14px;
      border: 1px solid #c3e6cb;
    }

    .success-message.show {
      display: block;
      animation: slideUp 0.3s ease-out;
    }

    /* Mobile responsiveness */
    @media (max-width: 600px) {
      .header {
        padding: 30px 20px;
      }

      .header h1 {
        font-size: 24px;
      }

      .content {
        padding: 30px 20px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>Get in Touch</h1>
      <p>We'd love to hear from you. Send us a message on WhatsApp.</p>
    </div>

    <div class="content">
      <div class="success-message" id="successMessage">
        ✓ Redirecting to WhatsApp...
      </div>

      <form id="leadForm" novalidate>
        <div class="form-group">
          <label for="name">Full Name</label>
          <input type="text" id="name" name="name" placeholder="John Doe" required>
          <div class="error-message" id="nameError"></div>
        </div>

        <div class="form-group">
          <label for="phone">Phone Number</label>
          <input type="tel" id="phone" name="phone" placeholder="+1 (555) 000-0000" required>
          <div class="error-message" id="phoneError"></div>
        </div>

        <div class="form-group">
          <label for="purpose">Message</label>
          <textarea id="purpose" name="purpose" placeholder="Tell us about your project or inquiry..." required></textarea>
          <div class="error-message" id="purposeError"></div>
        </div>

        <button type="submit">
          <span class="spinner" id="spinner"></span>
          <span class="button-text" id="buttonText">Send via WhatsApp</span>
        </button>

        <div class="info-text">
          💬 We'll respond to your WhatsApp message as soon as possible
        </div>
      </form>
    </div>
  </div>

  <script>
    const form = document.getElementById("leadForm");
    const submitBtn = form.querySelector("button");
    const spinner = document.getElementById("spinner");
    const buttonText = document.getElementById("buttonText");
    const successMessage = document.getElementById("successMessage");

    // Form validation
    function validateForm() {
      let isValid = true;

      // Validate name
      const name = document.getElementById("name").value.trim();
      const nameError = document.getElementById("nameError");
      if (!name || name.length < 2) {
        nameError.textContent = "Please enter a valid name";
        nameError.classList.add("show");
        isValid = false;
      } else {
        nameError.classList.remove("show");
      }

      // Validate phone
      const phone = document.getElementById("phone").value.trim();
      const phoneError = document.getElementById("phoneError");
      const phoneRegex = /^[\d\s\-\+\(\)]+$/;
      if (!phone || !phoneRegex.test(phone) || phone.replace(/\D/g, "").length < 7) {
        phoneError.textContent = "Please enter a valid phone number";
        phoneError.classList.add("show");
        isValid = false;
      } else {
        phoneError.classList.remove("show");
      }

      // Validate message
      const purpose = document.getElementById("purpose").value.trim();
      const purposeError = document.getElementById("purposeError");
      if (!purpose || purpose.length < 5) {
        purposeError.textContent = "Please enter a message (at least 5 characters)";
        purposeError.classList.add("show");
        isValid = false;
      } else {
        purposeError.classList.remove("show");
      }

      return isValid;
    }

    // Clear error on input
    document.getElementById("name").addEventListener("input", function() {
      document.getElementById("nameError").classList.remove("show");
    });

    document.getElementById("phone").addEventListener("input", function() {
      document.getElementById("phoneError").classList.remove("show");
    });

    document.getElementById("purpose").addEventListener("input", function() {
      document.getElementById("purposeError").classList.remove("show");
    });

    form.addEventListener("submit", function(e) {
      e.preventDefault();

      if (!validateForm()) {
        return;
      }

      const name = document.getElementById("name").value.trim();
      const phone = document.getElementById("phone").value.trim();
      const purpose = document.getElementById("purpose").value.trim();

      // Show loading state
      submitBtn.disabled = true;
      spinner.classList.add("show");
      buttonText.textContent = "Opening WhatsApp...";
      successMessage.classList.add("show");

      // Create WhatsApp message
      const message = `Hello! I'd like to get in touch.\n\nName: ${name}\nPhone: ${phone}\n\nMessage: ${purpose}`;
      const encodedMessage = encodeURIComponent(message);
      const whatsappURL = `https://wa.me/7799423794?text=${encodedMessage}`;

      // Open WhatsApp after a brief delay for better UX
      setTimeout(() => {
        window.open(whatsappURL, "_blank");

        // Reset form after a delay
        setTimeout(() => {
          form.reset();
          submitBtn.disabled = false;
          spinner.classList.remove("show");
          buttonText.textContent = "Send via WhatsApp";
          successMessage.classList.remove("show");
        }, 1000);
      }, 300);
    });
  </script>
</body>
</html>
